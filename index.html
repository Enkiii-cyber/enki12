<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ENKI_00</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial,sans-serif;

background:
linear-gradient(
rgba(0,0,0,.2),
rgba(0,0,0,.55)
),
url("bg.jpg");

background-size:cover;
background-position:center;
}

/* CARD */

.card{
display:flex;
flex-direction:column;
align-items:center;
animation:float 4s ease-in-out infinite;
}

/* LINK */

.top-links{

position:fixed;
top:18px;
right:18px;

display:grid;
grid-template-columns:
repeat(2,120px);

gap:10px;
z-index:999;

}

.top-links a{

text-decoration:none;

color:white;

font-size:13px;

font-weight:bold;

padding:10px;

border-radius:12px;

background:
rgba(20,20,30,.7);

backdrop-filter:
blur(8px);

border:
1px solid rgba(255,255,255,.15);

box-shadow:
0 5px 20px rgba(0,0,0,.5),
0 0 18px rgba(170,0,255,.4);

text-align:center;

transition:.25s;

}

.top-links a:hover{

transform:
translateY(-3px);

box-shadow:
0 0 30px #ff00ff;

}

/* FOTO */

.profile{

width:210px;
height:210px;

border-radius:50%;

object-fit:cover;

border:
4px solid #d100ff;

box-shadow:
0 0 30px #d100ff,
0 0 70px #d100ff,
0 0 130px #d100ff;

animation:
pulse 2s infinite;

}

h1{

margin-top:20px;

font-size:48px;

color:#f0a7ff;

text-shadow:
0 0 20px #ff00ff,
0 0 60px #ff00ff;

}

.typing{

margin-top:12px;

height:35px;

font-size:18px;

color:white;

letter-spacing:2px;

text-align:center;

}

#playmsg{

margin-top:15px;

color:white;

opacity:.85;

}

@keyframes pulse{

50%{

box-shadow:
0 0 45px #ff00ff,
0 0 100px #ff00ff,
0 0 160px #ff00ff;

}

}

@keyframes float{

50%{

transform:
translateY(-10px);

}

}

@media(max-width:500px){

.profile{

width:170px;
height:170px;

}

h1{

font-size:38px;

}

.top-links{

grid-template-columns:
repeat(2,100px);

}

}

</style>

</head>

<body>

<div class="top-links">

<a href="https://discord.gg/Ynuj9KWgE" target="_blank">
Discord
</a>

<a href="https://whatsapp.com/channel/0029VbD9m421CYoJb8EYv02G" target="_blank">
WhatsApp
</a>

<a href="https://tiktok.com/@enkyyy555" target="_blank">
TIKTOK
</a>

<a href="https://sociabuzz.com/enki_12/tribe" target="_blank">
DONATE
</a>

</div>

<div class="card">

<img
src="Enki.jpg"
class="profile">

<h1>ENKII</h1>

<div class="typing"></div>

<div id="playmsg">
KINDNESS
</div>

</div>

<audio id="musik" loop>
<source src="music1.mp3">
</audio>

<script>

const musik=
document.getElementById(
"musik"
);

const playmsg=
document.getElementById(
"playmsg"
);

document.addEventListener(

"click",

async()=>{

try{

await musik.play();

playmsg.innerHTML=
"🎵 NOW PLAYING";

}

catch{

playmsg.innerHTML=
"Tap lagi buat play";

}

},

{once:true}

);

const text=[

"ACCESS GRANTED",

"WELCOME TO ENKI",

"SYSTEM ONLINE",

"Forgive, even if you",

"never get an apology.",

"GOOD BYE"

];

let i=0;
let j=0;

const target=
document.querySelector(
".typing"
);

function type(){

if(
j<
text[i].length
){

target.innerHTML+=
text[i][j];

j++;

setTimeout(
type,
90
);

}

else{

setTimeout(()=>{

target.innerHTML="";

j=0;

i=
(i+1)
%
text.length;

type();

},
1800);

}

}

type();

</script>

</body>

</html>
